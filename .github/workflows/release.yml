name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional release tag to create/update, for example v1.1.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release metadata
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            VERSION_NAME="${GITHUB_REF_NAME#v}"
            PRERELEASE=false
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag_name }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.tag_name }}"
            VERSION_NAME="${RELEASE_TAG#v}"
            PRERELEASE=false
          else
            VERSION_NAME="1.1.${GITHUB_RUN_NUMBER}"
            RELEASE_TAG="v${VERSION_NAME}"
            PRERELEASE=true
          fi

          VERSION_CODE="${GITHUB_RUN_NUMBER}"

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "PRERELEASE=${PRERELEASE}" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Prepare signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Validate signing config
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          keytool -list \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null

      - name: Build release artifacts
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk/release -maxdepth 1 -type f \( -name "*.apk" -o -name "*.idsig" \) -exec cp {} release-artifacts/ \;
          find app/build/outputs/bundle/release -maxdepth 1 -type f -name "*.aab" -exec cp {} release-artifacts/ \;
          if [ -f app/build/outputs/mapping/release/mapping.txt ]; then
            cp app/build/outputs/mapping/release/mapping.txt release-artifacts/
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safebaiyun-release
          path: release-artifacts/
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
          generate_release_notes: true
          files: release-artifacts/*
